# Build the Astro site (+ Pagefind index) and deploy to GitHub Pages.
# Replaces the old `mkdocs gh-deploy` → gh-pages branch flow. After merging,
# set Pages source to "GitHub Actions" in the repo settings (Settings → Pages).
name: Deploy to GitHub Pages

on:
  push:
    # Deploys from main once merged; astro-migration lets us verify the live
    # site (base path, assets, search) before the cutover — drop it after merge.
    branches: [main, astro-migration]
  workflow_dispatch:

# Least privilege for the Pages deployment (OIDC token + Pages write).
permissions:
  contents: read
  pages: write
  id-token: write

# One live deployment at a time; let an in-flight deploy finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Default lfs:false — leave cheap pointer files; real bytes come from the
      # cache below so unchanged artifacts don't re-spend LFS bandwidth quota
      # (Actions LFS fetches count, and ~25 MB/build would exhaust the 1 GB/mo
      # free tier in ~40 cold builds). The build needs real bytes: public/static
      # files are copied verbatim into dist/ as post download assets.
      - uses: actions/checkout@v4
      - name: List LFS object ids (cache key)
        run: git lfs ls-files -l | cut -d' ' -f1 | sort > .lfs-assets-id
      - name: Cache LFS objects
        uses: actions/cache@v4
        with:
          path: .git/lfs
          # Key hashes the set of LFS object ids — changes only when an artifact
          # is added/edited (≈ once per new post), so it's a hit on most builds.
          key: lfs-${{ hashFiles('.lfs-assets-id') }}
      - name: Pull LFS (only missing objects — zero bandwidth on cache hit)
        run: git lfs pull
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8
      - uses: actions/configure-pages@v5
      - run: bun install --frozen-lockfile
      # `astro build && pagefind --site dist` — emits the site + search index.
      - run: bun run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
